    [params.summary]
        enable = true
        text = "**Data science leader delivering measurable business impact**: 12+ years driving revenue growth, customer value, and strategic decision-making through advanced analytics, machine learning, and data products. Currently at ASB Bank optimising pricing strategy and driving customer intelligence initiatives. Rare combination of commercial expertise, technical depth, and policy modelling knowledge—proven ability to translate complex models into clear, actionable insights for C-suite stakeholders. Specialist in customer lifetime value systems, predictive analytics, generative AI applications, and large-scale microsimulation. Recognised mentor building high-performing analytics teams. Experience spans financial services, government policy, and consulting."


